<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin • Veludo Lash</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="admin-page loaded">
  <!-- FUNDO -->
  <div class="ig-bg" aria-hidden="true">
    <div class="ig-bg__img" id="igBgImg"></div>
    <div class="ig-bg__overlay"></div>
  </div>

  <!-- HEADER -->
  <header class="admin-header">
    <nav class="admin-tabs" aria-label="Navegação do Admin">
      <!-- CLIENTES -->
      <button class="tab active" type="button" data-tab="clientes" aria-controls="pane-clientes" aria-selected="true">
        <span class="tab-ico" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M20 21a8 8 0 0 0-16 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Z" stroke="currentColor" stroke-width="2"/>
          </svg>
        </span>
        <span class="tab-txt">Clientes</span>
      </button>

      <!-- AGENDA -->
      <button class="tab" type="button" data-tab="agenda" aria-controls="pane-agenda" aria-selected="false">
        <span class="tab-ico" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M8 2v3M16 2v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M3 9h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M5 5h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="2"/>
          </svg>
        </span>
        <span class="tab-txt">Agenda</span>
      </button>

      <!-- LEMBRETES -->
      <button class="tab" type="button" data-tab="lembretes" aria-controls="pane-lembretes" aria-selected="false">
        <span class="tab-ico" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 7h18s-3 0-3-7Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M10 19a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="tab-txt">Lembretes</span>
      </button>
    </nav>
  </header>

  <!-- CONTEÚDO -->
  <main class="admin-shell">
    <div class="admin-card">
      <div id="msg" class="small"></div>

      <!-- ================== CLIENTES ================== -->
      <section id="pane-clientes" class="pane active" data-page="clientes">
        <h2>Clientes</h2>

        <div class="row">
          <input id="cliNome" placeholder="Nome do cliente" />
        </div>

        <div class="row row-tel">
          <input id="cliDDD" placeholder="DDD" inputmode="numeric" maxlength="2" />
          <input id="cliTel" placeholder="Número (9 dígitos)" inputmode="numeric" maxlength="9" />
        </div>

        <button class="btn-glass gold" type="button" id="btnCriarCliente">Adicionar</button>

        <p class="small mut">Ex: DDD 11 + Número 950235221</p>

        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Nome</th>
                <th>WhatsApp</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="clientesBody"></tbody>
          </table>
        </div>
      </section>

      <!-- ================== AGENDA ================== -->
      <section id="pane-agenda" class="pane" data-page="agenda">
        <h2>Agenda</h2>

        <div class="row">
          <input id="filtroData" type="date" />
          <button class="btn2" type="button" id="btnAtualizarAgenda">Atualizar</button>
        </div>

        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Data</th>
                <th>Horário</th>
                <th>Serviço</th>
                <th>Cliente</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="agendaBody"></tbody>
          </table>
        </div>
      </section>

      <!-- ================== LEMBRETES ================== -->
      <section id="pane-lembretes" class="pane" data-page="lembretes">
        <h2>Lembretes</h2>
        <p class="mut">Aqui aparecem agendamentos confirmados com lembrete ainda não enviado.</p>

        <div class="row">
          <button class="btn2" type="button" id="btnAtualizarLembretes">Atualizar</button>
        </div>

        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Data</th>
                <th>Horário</th>
                <th>Serviço</th>
                <th>Cliente</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="lembretesBody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script src="admin.js"></script>

  <!-- parallax do fundo -->
  <script>
    (function(){
      const el = document.getElementById("igBgImg");
      if(!el) return;

      const speed = 0.35;

      function onScroll(){
        const y = Math.round(window.scrollY * speed);
        el.style.backgroundPosition = `center ${-y}px`;
      }

      window.addEventListener("scroll", onScroll, { passive: true });
      onScroll();
    })();
  </script>
</body>
</html>
