<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agendamento • Veludo Lash</title>
  <link rel="stylesheet" href="style.css">

  <!-- ✅ Calendário moderno (Flatpickr) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_dark.css">

  <style>
    /* ======== MODAL PIX (QR na frente) ======== */
    .pix-modal{
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    .pix-modal.open{ display: flex; }

    .pix-backdrop{
      position:absolute;
      inset:0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(6px);
    }

    .pix-card{
      position: relative;
      z-index: 2;
      width: min(560px, 100%);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(15,15,18,0.55);
      box-shadow: 0 30px 80px rgba(0,0,0,0.55);
      overflow: hidden;
    }

    .pix-head{
      padding: 14px 14px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      display:flex;
      align-items:flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .pix-head h3{
      margin:0;
      font-family: "Playfair Display", serif;
      font-size: 16px;
      color: rgba(255,255,255,0.92);
      text-shadow: 0 10px 26px rgba(0,0,0,0.55);
    }
    .pix-close{
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.92);
      border-radius: 12px;
      cursor: pointer;
      font-weight: 900;
      padding: 8px 10px;
      line-height: 1;
    }
    .pix-close:hover{ background: rgba(255,255,255,0.14); }

    .pix-body{
      padding: 14px;
    }

    .paygrid{
      display:grid;
      grid-template-columns: 170px 1fr;
      gap: 12px;
      align-items:center;
    }

    .qr{
      width: 170px;
      height: 170px;
      border-radius: 16px;
      overflow:hidden;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.2);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .qr img{ width:100%; height:100%; object-fit:cover; }

    .pixcode{
      width:100%;
      resize:none;
      min-height: 110px;
      padding: 10px 10px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(20, 20, 24, 0.28);
      color: rgba(255,255,255,0.92);
      font-size: 12px;
      outline:none;
      line-height: 1.35;
    }

    .pay-actions{
      margin-top: 10px;
      display:flex;
      gap:10px;
      flex-wrap: wrap;
      align-items:center;
      justify-content: space-between;
    }
    .pay-actions .btn2{ flex: 1 1 180px; }
    .timer{
      font-size: 12px;
      color: rgba(255,255,255,0.72);
      text-align:right;
      flex: 1 1 160px;
    }
    .tokenline{
      margin-top: 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      word-break: break-all;
    }

    /* ======== TELA CONFIRMADO ======== */
    .okbox{
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(15,15,18,0.30);
      backdrop-filter: blur(1px);
      display:none;
    }
    .okbox.open{ display:block; }
    .oktitle{
      margin:0 0 6px;
      font-family: "Playfair Display", serif;
      font-size: 16px;
      color: rgba(255,255,255,0.92);
    }

    @media (max-width: 520px){
      .paygrid{ grid-template-columns: 1fr; }
      .qr{ width: 220px; height:220px; margin: 0 auto; }
      .timer{ text-align:left; }
    }
  </style>
</head>
<body>

  <!-- ✅ FUNDO INSTAGRAM -->
  <div class="ig-bg" aria-hidden="true">
    <div class="ig-bg__img" id="igBgImg"></div>
    <div class="ig-bg__overlay"></div>
  </div>

  <!-- ✅ MODAL PIX (fica fora do card) -->
  <div id="pixModal" class="pix-modal" aria-hidden="true">
    <div class="pix-backdrop" onclick="fecharPixModal()"></div>

    <div class="pix-card" role="dialog" aria-modal="true" aria-labelledby="pixTitle">
      <div class="pix-head">
        <div>
          <h3 id="pixTitle">Pagamento do sinal</h3>
          <div class="small" id="pixSub" style="margin-top:4px;">
            Pague o sinal para confirmar a reserva.
          </div>
        </div>

        <button class="pix-close" type="button" onclick="fecharPixModal()">✕</button>
      </div>

      <div class="pix-body">
        <div class="paygrid">
          <div class="qr">
            <img id="qrImg" alt="QR Code PIX" />
          </div>

          <div>
            <textarea id="pixCode" class="pixcode" readonly></textarea>

            <div class="pay-actions">
              <button class="btn2" type="button" onclick="copiarPix()">Copiar PIX (copia e cola)</button>
              <div class="timer" id="timerTxt">Expira em: --:--</div>
            </div>

            <div class="tokenline" id="tokenLine"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="grid" style="grid-template-columns: 1fr;">
      <div class="card glass">

        <div class="brand brand-card">
          <div class="logo-wrap">
            <div class="logo">
  <img src="img/veludo-lash-logo.png" alt="Veludo Lash" class="logo-img">
</div>
            <div class="byline"></div>
          </div>
        </div>

        <h2>Seus dados</h2>

        <input id="nome" placeholder="Seu nome">

        <div class="row">
          <input id="ddd" placeholder="DDD" inputmode="numeric" maxlength="2">
          <input id="telefone" placeholder="WhatsApp" inputmode="numeric" maxlength="9">
        </div>
        <p class="small" style="margin-top:-4px;">Ex: (11) 999999999</p>

        <h2>Serviço</h2>
        <div id="servicos" class="services"></div>

        <input type="hidden" id="servico" value="">
        <input type="hidden" id="valor" value="">
        <p class="small" id="servico_info">Escolha um serviço para ver o valor.</p>

        <h2>Agendamento</h2>

        <div class="row">
          <input id="data" type="text" placeholder="Selecione a data" readonly>
          <input type="hidden" id="horario" value="">

          <div class="slot-wrapper">
            <button type="button" id="slot_toggle" class="slot-toggle">
              <span id="horario_label">--:--</span>
              <span id="slot_chev">▾</span>
            </button>
            <div id="horarios_grid" class="hidden"></div>
          </div>
        </div>

        <p class="small" id="horario_hint" style="text-align:right;">Clique na seta para ver os horários.</p>

        <button class="btn-glass gold" id="btnReservar" onclick="reservarComSinal()">
          Reservar com sinal (R$ 40)
        </button>

        <div id="msg" style="margin-top:15px;"></div>

        <!-- ✅ confirmação automática -->
        <div id="okbox" class="okbox">
          <div class="oktitle">Agendamento confirmado ✅</div>
          <div class="small" id="oktext">
            Seu horário está garantido. Qualquer dúvida, fale com o studio.
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ✅ Flatpickr JS -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>

  <script>
    const CATALOGO = [
      { nome: "Mega Fox", valor: 175.00, img: "img/mega-fox.jpg" },
      { nome: "Brown Fox", valor: 130.00, img: "img/brown-fox.jpg" },
      { nome: "Fox eyes tradicional", valor: 130.00, img: "img/fox-eyes-tradicional.jpg" },
      { nome: "Mega volume brasileiro", valor: 145.00, img: "img/mega-volume-brasileiro.jpg" },
      { nome: "Volume Brasil", valor: 120.00, img: "img/volume-brasil.jpg" },
      { nome: "Fio a fio", valor: 150.00, img: "img/fio-a-fio.jpg" },
    ];

    function brl(v){
      return "R$ " + Number(v).toFixed(2).replace(".", ",");
    }
    function onlyDigits(v=""){
      return String(v).replace(/\D/g, "");
    }
    function validarTelefoneFront(ddd, numero){
      const d = onlyDigits(ddd);
      const n = onlyDigits(numero);
      if (d.length !== 2) return { ok:false, msg:"DDD inválido (2 dígitos)." };
      if (!(n.length === 8 || n.length === 9)) return { ok:false, msg:"Número inválido (8 ou 9 dígitos)." };
      return { ok:true, tel: d + n, formatado:`(${d}) ${n}` };
    }

    function montarCatalogo(){
      const wrap = document.getElementById("servicos");
      const inputServico = document.getElementById("servico");
      const inputValor = document.getElementById("valor");
      const info = document.getElementById("servico_info");

      wrap.innerHTML = "";

      CATALOGO.forEach((s, idx) => {
        const card = document.createElement("div");
        card.className = "service-card";
        card.innerHTML = `
          <img src="${s.img}" alt="${s.nome}">
          <div class="service-body">
            <div class="service-name">${s.nome}</div>
            <div class="service-price">${brl(s.valor)}</div>
          </div>
        `;

        card.addEventListener("click", () => {
          document.querySelectorAll(".service-card").forEach(c => c.classList.remove("active"));
          card.classList.add("active");

          inputServico.value = s.nome;
          inputValor.value = s.valor;
          info.textContent = `Selecionado: ${s.nome} • ${brl(s.valor)}`;
        });

        if (idx === 0) setTimeout(() => card.click(), 0);
        wrap.appendChild(card);
      });
    }

    async function carregarHorarios() {
      const data = document.getElementById("data").value;
      const grid = document.getElementById("horarios_grid");
      const hidden = document.getElementById("horario");
      const label = document.getElementById("horario_label");
      const chev = document.getElementById("slot_chev");

      grid.innerHTML = "";
      hidden.value = "";
      label.textContent = "--:--";
      grid.classList.add("hidden");
      chev.classList.remove("open");

      if (!data) return;

      const res = await fetch(`/horarios-disponiveis?data=${encodeURIComponent(data)}`);
      const horarios = await res.json().catch(()=>[]);

      if (!Array.isArray(horarios) || !horarios.length) {
        label.textContent = "Sem horários";
        return;
      }

      hidden.value = horarios[0];
      label.textContent = horarios[0];

      horarios.forEach((h, idx) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "slot";
        btn.textContent = h;
        if (idx === 0) btn.classList.add("ativo");

        btn.addEventListener("click", (e) => {
          e.preventDefault();
          document.querySelectorAll("#horarios_grid .slot").forEach(b => b.classList.remove("ativo"));
          btn.classList.add("ativo");
          hidden.value = h;
          label.textContent = h;

          // trocar horário => fecha modal e limpa status antigo
          resetFluxoPagamento();

          fecharDropdown();
        });

        grid.appendChild(btn);
      });
    }

    function abrirDropdown(){
      document.getElementById("horarios_grid").classList.remove("hidden");
      document.getElementById("slot_chev").classList.add("open");
    }
    function fecharDropdown(){
      document.getElementById("horarios_grid").classList.add("hidden");
      document.getElementById("slot_chev").classList.remove("open");
    }
    function soNumero(el){
      if (!el) return;
      el.addEventListener("input", () => {
        el.value = el.value.replace(/\D/g, "");
      });
    }

    // ===================== MODAL PIX + STREAM =====================
    let timerInterval = null;
    let eventSource = null;       // SSE
    let tokenAtual = null;
    let reservaAtual = null;      // {nome, telefoneFormatado, servico, data, horario, valor}

    function abrirPixModal(){
      const modal = document.getElementById("pixModal");
      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function fecharPixModal(){
      const modal = document.getElementById("pixModal");
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
      // não encerra SSE ao fechar, porque a confirmação pode acontecer depois
    }

    function limparModalPix(){
      document.getElementById("qrImg").removeAttribute("src");
      document.getElementById("pixCode").value = "";
      document.getElementById("tokenLine").textContent = "";
      document.getElementById("timerTxt").textContent = "Expira em: --:--";
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = null;
    }

    function pararStream(){
      if (eventSource) {
        try { eventSource.close(); } catch(_){}
      }
      eventSource = null;
      tokenAtual = null;
    }

    function resetFluxoPagamento(){
      // fecha modal, limpa modal, para stream, esconde confirmado
      fecharPixModal();
      limparModalPix();
      pararStream();
      document.getElementById("okbox").classList.remove("open");
    }

    function iniciarTimer(expiraEm){
      if (timerInterval) clearInterval(timerInterval);

      const alvo = new Date(expiraEm).getTime();

      function tick(){
        const agora = Date.now();
        const diff = Math.max(0, alvo - agora);

        const totalSeg = Math.floor(diff / 1000);
        const min = String(Math.floor(totalSeg / 60)).padStart(2,"0");
        const sec = String(totalSeg % 60).padStart(2,"0");

        document.getElementById("timerTxt").textContent = `Expira em: ${min}:${sec}`;

        if (diff <= 0){
          clearInterval(timerInterval);
          timerInterval = null;
          document.getElementById("timerTxt").textContent = "Reserva expirada. Escolha outro horário.";

          // se expirar, encerra stream e mostra msg
          pararStream();
          document.getElementById("msg").innerHTML =
            `<span class="badge">⏳ Reserva expirada. Escolha outro horário.</span>`;
        }
      }

      tick();
      timerInterval = setInterval(tick, 1000);
    }

    async function copiarPix(){
      const pix = document.getElementById("pixCode").value || "";
      if (!pix) return;

      try{
        await navigator.clipboard.writeText(pix);
        document.getElementById("msg").innerHTML = `<span class="badge">✅ PIX copiado!</span>`;
      }catch(e){
        const ta = document.getElementById("pixCode");
        ta.focus();
        ta.select();
        document.execCommand("copy");
        document.getElementById("msg").innerHTML = `<span class="badge">✅ PIX copiado!</span>`;
      }
    }

    function setLoadingReservar(loading){
      const btn = document.getElementById("btnReservar");
      if (!btn) return;
      btn.disabled = !!loading;
      btn.style.opacity = loading ? "0.75" : "";
      btn.textContent = loading ? "Gerando cobrança..." : "Reservar com sinal (R$ 40)";
    }

    function iniciarStreamReserva(token){
      pararStream();
      tokenAtual = token;

      try{
        eventSource = new EventSource(`/reservas/${encodeURIComponent(token)}/stream`);

        eventSource.addEventListener("hello", () => {
          // ok
        });

        eventSource.addEventListener("paid", async (ev) => {
          // pagamento confirmado no servidor
          let data = {};
          try { data = JSON.parse(ev.data || "{}"); } catch(_){}

          // mostra confirmado na tela
          document.getElementById("okbox").classList.add("open");

          // mensagem bonita com resumo
          if (reservaAtual){
            document.getElementById("oktext").innerHTML =
              `✅ <b>${reservaAtual.servico}</b> confirmado para <b>${reservaAtual.data}</b> às <b>${reservaAtual.horario}</b>.<br>` +
              `Sinal: <b>${brl(reservaAtual.valor)}</b>.`;
          }

          document.getElementById("msg").innerHTML =
            `<span class="badge">✅ Pagamento confirmado! Seu agendamento foi concluído.</span>`;

          // fecha modal automaticamente
          fecharPixModal();

          // atualiza horários
          await carregarHorarios();

          // encerra stream (server já deve encerrar também)
          pararStream();
        });

        eventSource.addEventListener("expired", async (ev) => {
          // reserva expirada/cancelada
          document.getElementById("msg").innerHTML =
            `<span class="badge">⏳ Reserva expirada. Escolha outro horário.</span>`;
          fecharPixModal();
          await carregarHorarios();
          pararStream();
        });

        eventSource.addEventListener("error", () => {
          // se der erro, não trava nada — só mantém o fluxo
        });
      }catch(e){
        // sem stream, segue normal
      }
    }

    // ===================== RESERVAR COM SINAL =====================
    async function reservarComSinal(){
      const nome = document.getElementById("nome").value.trim();
      const ddd = document.getElementById("ddd").value.trim();
      const numero = document.getElementById("telefone").value.trim();
      const vtel = validarTelefoneFront(ddd, numero);

      const servico = document.getElementById("servico").value.trim();
      const data = document.getElementById("data").value;
      const horario = document.getElementById("horario").value;

      const msg = document.getElementById("msg");
      msg.innerHTML = "";

      // reset geral
      resetFluxoPagamento();

      if(!nome || !ddd || !numero || !servico || !data || !horario){
        msg.innerHTML = "<span class='badge'>Preencha todos os campos para reservar.</span>";
        return;
      }

      if(!vtel.ok){
        msg.innerHTML = `<span class="badge">❌ ${vtel.msg}</span>`;
        return;
      }

      const telSoDigitos = vtel.tel;

      setLoadingReservar(true);

      try{
        const res = await fetch("/public-reservar", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({ nome, telefone: telSoDigitos, servico, data, horario })
        });

        const payload = await res.json().catch(()=> ({}));

        if(res.status === 409){
          msg.innerHTML = `<span class="badge">❌ ${payload.erro || "Horário indisponível."}</span>`;
          await carregarHorarios();
          return;
        }

        if(!res.ok){
          msg.innerHTML = `<span class="badge">❌ ${payload.erro || "Não foi possível reservar."}</span>`;
          return;
        }

        const valor = payload.valor_sinal ?? 40;

        // guarda resumo pro confirmado
        reservaAtual = { nome, servico, data, horario, valor };

        // abre modal NA FRENTE
        abrirPixModal();

        // preenche modal
        if(payload.qr_code_data_url){
          document.getElementById("qrImg").src = payload.qr_code_data_url;
        }else{
          document.getElementById("qrImg").removeAttribute("src");
        }

        document.getElementById("pixCode").value = payload.pix_copia_e_cola || "";
        document.getElementById("tokenLine").textContent = payload.token
          ? `Código da reserva: ${payload.token}`
          : "";

        if(payload.expira_em){
          iniciarTimer(payload.expira_em);
        }

        msg.innerHTML = `
          <div class="badge" style="margin-bottom:10px;">
            ✅ Reserva criada. Pague o sinal de ${brl(valor)} para confirmar.
          </div>
          <div class="small">
            Após o pagamento, a confirmação vai aparecer automaticamente aqui.
          </div>
        `;

        // inicia stream (pra cair automático)
        if(payload.token){
          iniciarStreamReserva(payload.token);
        }

        // atualiza horários (vai bloquear esse horário)
        await carregarHorarios();

        fecharDropdown();
      } finally {
        setLoadingReservar(false);
      }
    }

    // ===================== INIT =====================
    document.addEventListener("DOMContentLoaded", () => {
      montarCatalogo();
      soNumero(document.getElementById("ddd"));
      soNumero(document.getElementById("telefone"));
      const dddInput = document.getElementById("ddd");
  const telInput = document.getElementById("telefone");

  dddInput.addEventListener("input", () => {
    dddInput.value = dddInput.value.replace(/\D/g, "").slice(0,2);

    if (dddInput.value.length === 2) {
      telInput.focus();
    }
  });

      flatpickr("#data", {
        locale: "pt",
        dateFormat: "Y-m-d",
        minDate: "today",
        disableMobile: true,
        onChange: () => {
          resetFluxoPagamento();
          carregarHorarios();
        }
      });

      const btn = document.getElementById("slot_toggle");
      const grid = document.getElementById("horarios_grid");

      if (btn && grid) {
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          grid.classList.contains("hidden") ? abrirDropdown() : fecharDropdown();
        });

        document.addEventListener("click", fecharDropdown);
        grid.addEventListener("click", (e) => e.stopPropagation());
      }

      carregarHorarios();
    });
  </script>

  <!-- ✅ PARALLAX -->
  <script>
    (function(){
      const el = document.getElementById("igBgImg");
      if(!el) return;

      const speed = 0.35;
      function onScroll(){
        const y = Math.round(window.scrollY * speed);
        el.style.backgroundPosition = `center ${-y}px`;
      }

      window.addEventListener("scroll", onScroll, { passive: true });
      onScroll();
    })();
  </script>

</body>
</html>
